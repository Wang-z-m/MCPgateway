tool_meta:
  name: probe_slow
  title: 慢响应探测
  description: 触发一个响应缓慢但最终成功的下游接口，用于测试超时与延迟场景。
  version: "1.0.0"
  tags: ["实验", "延迟"]
input_schema:
  type: object
  properties: {}
  additionalProperties: false
http_target:
  method: GET
  base_url: http://127.0.0.1:9001
  path: /slow
  timeout_seconds: 2
  retry_count: 1
request_mapping:
  path_map: {}
  query_map: {}
  header_map: {}
  body_map: {}
response_mapping:
  result_path: data
  include_http_meta: true
error_mapping:
  status_map:
    "500": DOWNSTREAM_ERROR
  default_code: DOWNSTREAM_ERROR
