tool_meta:
  name: probe_retry
  title: 重试探测
  description: 触发一个不稳定的下游接口，用于验证幂等请求的自动重试机制。
  version: "1.0.0"
  tags: ["实验", "重试"]
  category: "system"
  tier: "secondary"
input_schema:
  type: object
  properties: {}
  additionalProperties: false
http_target:
  method: GET
  base_url: http://127.0.0.1:9001
  path: /flaky
  timeout_seconds: 2
  retry_count: 1
request_mapping:
  path_map: {}
  query_map: {}
  header_map: {}
  body_map: {}
response_mapping:
  result_path: data
  include_http_meta: true
error_mapping:
  status_map:
    "503": DOWNSTREAM_ERROR
  default_code: DOWNSTREAM_ERROR
